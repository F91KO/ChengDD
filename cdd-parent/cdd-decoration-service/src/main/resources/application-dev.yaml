spring:
  datasource:
    url: ${CDD_DECORATION_DB_URL:jdbc:mysql://127.0.0.1:${CDD_LOCAL_MYSQL_PORT:3306}/${CDD_LOCAL_MYSQL_DATABASE:chengdd}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${CDD_DECORATION_DB_USERNAME:${CDD_LOCAL_MYSQL_USERNAME:root}}
    password: ${CDD_DECORATION_DB_PASSWORD:${CDD_LOCAL_MYSQL_ROOT_PASSWORD:change_me}}
    driver-class-name: ${CDD_DECORATION_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

cdd:
  runtime:
    env: dev

server:
  port: 8083
