spring:
  datasource:
    url: jdbc:h2:mem:cdd-order-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/order/h2/schema.sql
      data-locations: classpath:db/order/h2/data-test.sql

cdd:
  runtime:
    env: test

server:
  port: 8085
