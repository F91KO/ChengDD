spring:
  datasource:
    url: ${CDD_RELEASE_DB_URL:jdbc:h2:mem:cdd-release-local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1}
    username: ${CDD_RELEASE_DB_USERNAME:sa}
    password: ${CDD_RELEASE_DB_PASSWORD:}
    driver-class-name: ${CDD_RELEASE_DB_DRIVER_CLASS_NAME:org.h2.Driver}
  sql:
    init:
      mode: ${CDD_RELEASE_SQL_INIT_MODE:always}
      schema-locations: ${CDD_RELEASE_SQL_SCHEMA_LOCATIONS:classpath:db/release/h2/schema.sql}
      data-locations: ${CDD_RELEASE_SQL_DATA_LOCATIONS:classpath:db/release/h2/data-local.sql}

cdd:
  runtime:
    env: local

server:
  port: 8087
