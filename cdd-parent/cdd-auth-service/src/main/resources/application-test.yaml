spring:
  datasource:
    url: jdbc:h2:mem:cdd-auth-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/auth/h2/schema.sql
      data-locations: classpath:db/auth/h2/data-test.sql

cdd:
  runtime:
    env: test
  security:
    permit-all: true
    jwt:
      issuer: cdd-auth-service-test
      secret: chengdd-jwt-secret-for-tests-20260321-abcdef
      access-token-ttl: 30m
      refresh-token-ttl: 7d

server:
  port: 8081
