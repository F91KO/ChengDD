spring:
  datasource:
    url: ${CDD_AUTH_DB_URL:${CDD_TEST_MYSQL_URL:jdbc:mysql://127.0.0.1:${CDD_LOCAL_MYSQL_PORT:3306}/${CDD_TEST_MYSQL_DATABASE:chengdd_test}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}}
    username: ${CDD_AUTH_DB_USERNAME:${CDD_TEST_MYSQL_USERNAME:root}}
    password: ${CDD_AUTH_DB_PASSWORD:${CDD_TEST_MYSQL_PASSWORD:${CDD_LOCAL_MYSQL_ROOT_PASSWORD:change_me}}}
    driver-class-name: ${CDD_AUTH_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  sql:
    init:
      mode: never

cdd:
  runtime:
    env: test
  security:
    permit-all: true
    jwt:
      issuer: cdd-auth-service-test
      secret: chengdd-jwt-secret-for-tests-20260321-abcdef
      access-token-ttl: 30m
      refresh-token-ttl: 7d

server:
  port: 8081
