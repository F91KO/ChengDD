<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed-variant": "#783207",
                        "outline-variant": "#e2bfb0",
                        "on-tertiary-fixed": "#001d35",
                        "secondary-container": "#fe9a69",
                        "surface-dim": "#c9dcf3",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#edf4ff",
                        "on-secondary-fixed": "#351000",
                        "inverse-primary": "#ffb693",
                        "on-surface": "#091D2E",
                        "on-background": "#091D2E",
                        "error-container": "#ffdad6",
                        "surface-variant": "#d1e4fb",
                        "secondary-fixed": "#ffdbcc",
                        "primary-container": "#FF6B00",
                        "primary-fixed-dim": "#ffb693",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-container": "#059eff",
                        "on-primary-container": "#572000",
                        "inverse-on-surface": "#e8f2ff",
                        "surface-container-highest": "#d1e4fb",
                        "tertiary": "#0062a1",
                        "on-tertiary-fixed-variant": "#00497b",
                        "background": "#f7f9ff",
                        "on-primary-fixed-variant": "#7a3000",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-container-high": "#d9eaff",
                        "on-secondary-container": "#763006",
                        "surface-bright": "#f7f9ff",
                        "on-tertiary-container": "#003357",
                        "inverse-surface": "#203243",
                        "on-surface-variant": "#5a4136",
                        "surface-container": "#e3efff",
                        "secondary": "#96481e",
                        "tertiary-fixed-dim": "#9ccaff",
                        "primary-fixed": "#ffdbcc",
                        "primary": "#a04100",
                        "surface": "#f7f9ff",
                        "on-error-container": "#93000a",
                        "outline": "#8e7164",
                        "on-primary-fixed": "#351000",
                        "surface-tint": "#a04100",
                        "secondary-fixed-dim": "#ffb693",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white flex items-center justify-between px-6 h-16 border-b border-slate-100">
<div class="flex items-center gap-4">
<button class="text-[#FF6B00] active:scale-95 duration-200 flex items-center justify-center w-10 h-10 rounded-full hover:bg-orange-50 transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-[#091D2E] font-['Manrope'] font-bold text-lg tracking-tight">商户资料编辑 - 第1步 (确认版)</h1>
</div>
<button class="text-[#091D2E] active:scale-95 duration-200 flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 transition-colors">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</header>
<main class="pt-24 px-4 max-w-2xl mx-auto space-y-6">
<!-- Step Progress Bar (Editorial Layout) -->
<section class="bg-surface-container-low p-6 rounded-xl flex justify-between items-center relative overflow-hidden">
<div class="absolute top-0 left-0 w-1/3 h-1 bg-[#FF6B00]"></div>
<div class="flex flex-col items-start z-10 gap-1">
<span class="text-[10px] uppercase tracking-widest font-extrabold text-[#FF6B00]">Step 01</span>
<span class="text-sm font-bold text-[#091D2E]">1. 主体信息</span>
</div>
<div class="h-px w-8 bg-outline-variant/30"></div>
<div class="flex flex-col items-start z-10 gap-1 opacity-40">
<span class="text-[10px] uppercase tracking-widest font-bold text-[#091D2E]">Step 02</span>
<span class="text-sm font-medium text-[#091D2E]">2. 店铺信息</span>
</div>
<div class="h-px w-8 bg-outline-variant/30"></div>
<div class="flex flex-col items-start z-10 gap-1 opacity-40">
<span class="text-[10px] uppercase tracking-widest font-bold text-[#091D2E]">Step 03</span>
<span class="text-sm font-medium text-[#091D2E]">3. 接入配置</span>
</div>
</section>
<!-- Form Area: Step 1 Main Content -->
<section class="bg-surface-container-lowest p-8 rounded-xl shadow-sm space-y-8">
<div class="border-l-4 border-[#FF6B00] pl-4">
<h2 class="text-xl font-extrabold text-[#091D2E] tracking-tight">主体信息</h2>
<p class="text-on-surface-variant text-sm mt-1">请填写商户真实身份信息，确保审核通过</p>
</div>
<div class="space-y-6">
<!-- Merchant Name -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-[#091D2E]">商户名称</label>
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-[#FF6B00] focus:bg-white transition-all outline-none text-[#091D2E]" placeholder="输入营业执照上的全称" type="text"/>
</div>
<!-- Entity Type -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-[#091D2E]">主体类型</label>
<div class="flex gap-4">
<label class="flex-1 flex items-center justify-between p-4 rounded-xl border-2 border-[#FF6B00] bg-orange-50/50 cursor-pointer transition-all">
<span class="font-bold text-[#FF6B00]">企业</span>
<div class="w-5 h-5 rounded-full border-4 border-[#FF6B00] bg-white"></div>
<input checked="" class="hidden" name="entity_type" type="radio"/>
</label>
<label class="flex-1 flex items-center justify-between p-4 rounded-xl border-2 border-transparent bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all">
<span class="font-bold text-[#091D2E]">个人/个体</span>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant bg-white"></div>
<input class="hidden" name="entity_type" type="radio"/>
</label>
</div>
</div>
<!-- Contact Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-[#091D2E]">联系人姓名</label>
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-[#FF6B00] focus:bg-white transition-all outline-none text-[#091D2E]" placeholder="负责人真实姓名" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-[#091D2E]">联系电话</label>
<div class="flex">
<div class="h-12 px-3 flex items-center bg-surface-container-high rounded-l-lg border-r border-white/20 text-[#091D2E] font-bold text-sm">
                            +86
                        </div>
<input class="flex-1 h-12 px-4 bg-surface-container-low border-none rounded-r-lg focus:ring-2 focus:ring-[#FF6B00] focus:bg-white transition-all outline-none text-[#091D2E]" placeholder="11位手机号" type="tel"/>
</div>
</div>
</div>
<!-- File Upload -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-[#091D2E]">证照上传 (营业执照/身份证)</label>
<div class="relative group">
<div class="w-full aspect-video rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center gap-3 group-hover:border-[#FF6B00] group-hover:bg-orange-50/30 transition-all cursor-pointer overflow-hidden">
<div class="w-14 h-14 rounded-full bg-white flex items-center justify-center shadow-sm text-[#FF6B00]">
<span class="material-symbols-outlined text-3xl" data-icon="cloud_upload">cloud_upload</span>
</div>
<div class="text-center">
<p class="text-sm font-bold text-[#091D2E]">点击或拖拽上传</p>
<p class="text-[10px] text-on-surface-variant mt-1 uppercase">JPG, PNG OR PDF (MAX 5MB)</p>
</div>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
</div>
</div>
</div>
</section>
<!-- Tip Area -->
<section class="flex gap-4 p-5 bg-tertiary-fixed/20 rounded-xl border-l-4 border-tertiary">
<span class="material-symbols-outlined text-tertiary" data-icon="info">info</span>
<div>
<h4 class="text-sm font-bold text-[#091D2E]">温馨提示</h4>
<p class="text-xs text-[#091D2E]/70 leading-relaxed mt-1">
                资料提交后，我们将于 1-3 个工作日内完成审核。审核结果将通过短信及 App 推送告知，请保持关注。如有疑问可咨询右上方在线客服。
            </p>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 pb-safe bg-white shadow-[0_-8px_30px_rgb(0,0,0,0.04)] border-t border-slate-100">
<!-- Draft Action -->
<button class="flex flex-col items-center justify-center text-[#091D2E] py-2 active:opacity-60 transition-all hover:text-[#FF6B00] group">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform" data-icon="save">save</span>
<span class="font-['Manrope'] text-[10px] font-extrabold uppercase tracking-widest">保存草稿</span>
</button>
<!-- Next Action -->
<button class="flex items-center justify-center bg-[#FF6B00] text-white rounded-xl px-12 h-14 active:scale-[0.98] transition-all shadow-[0_12px_24px_-8px_rgba(255,107,0,0.5)]">
<div class="flex items-center gap-2">
<span class="font-['Manrope'] text-sm font-extrabold uppercase tracking-[0.2em] ml-2">下一步</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
</nav>
</body></html>
